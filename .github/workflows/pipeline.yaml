name: CI Pipeline

on: 
 push:
    branches: [ main ] 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 
        uses: actions/setup-node@v4 
        with: 
          node-version: v16
      
      - name: Install dependencies 
        run: npm Install
        
      - name: Run tests 
        run: npm test   



